name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check src/ tests/

      - name: Type check with pyright
        run: uv run pyright src/

      - name: Run tests
        run: uv run pytest tests/ -x --cov=src/xchat_bot --cov-report=xml --cov-report=term-missing
        env:
          XCHAT_CONSUMER_KEY: test_key
          XCHAT_CONSUMER_SECRET: test_secret

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t xchat-bot-starter-pro:test .

      - name: Test Docker image — CLI
        run: |
          docker run --rm xchat-bot-starter-pro:test xchat version

      - name: Test Docker image — example bot loads
        run: |
          docker run --rm \
            -e XCHAT_BEARER_TOKEN=test_token \
            xchat-bot-starter-pro:test \
            python -c "from xchat_bot.examples.echo_bot import EchoBot; print('EchoBot OK')"

      - name: Test Docker image — webhook server starts and healthz responds
        run: |
          docker run -d --name xchat-smoke \
            -p 8080:8080 \
            -e XCHAT_TRANSPORT_MODE=webhook \
            -e XCHAT_CONSUMER_KEY=test_key \
            -e XCHAT_CONSUMER_SECRET=test_secret \
            xchat-bot-starter-pro:test \
            xchat run --transport webhook
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:8080/healthz
          docker stop xchat-smoke
